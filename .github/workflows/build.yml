name: Build & Release

on:
  push:
    tags:
      - 'v*.*.*.*'
      - 'v*.*.*'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    name: Build Plugin
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.0.x'

      - name: Restore
        run: dotnet restore Jellyfin.Plugin.AbyssSpotlight/Jellyfin.Plugin.AbyssSpotlight.csproj

      - name: Build
        run: |
          dotnet build Jellyfin.Plugin.AbyssSpotlight/Jellyfin.Plugin.AbyssSpotlight.csproj \
            --configuration Release \
            --no-restore \
            -o ./build

      - name: Bake manifest
        id: bake
        run: python3 bake_manifest.py
        env:
          GITHUB_REPOSITORY: ${{ github.repository }}
          GITHUB_REF_NAME: ${{ github.ref_name }}

      - name: Commit manifest to main
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          cp Jellyfin.Plugin.AbyssSpotlight/manifest.json /tmp/manifest_baked.json
          git checkout main
          cp /tmp/manifest_baked.json Jellyfin.Plugin.AbyssSpotlight/manifest.json
          git add Jellyfin.Plugin.AbyssSpotlight/manifest.json
          git diff --cached --quiet || git commit -m "chore: update manifest for ${{ github.ref_name }} [skip ci]"
          git push origin main

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            ./build/Jellyfin.Plugin.AbyssSpotlight.dll
            Jellyfin.Plugin.AbyssSpotlight/manifest.json
          generate_release_notes: true